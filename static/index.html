<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Calculator</title>
<link rel="stylesheet" href="/static/style.css">
</head>
<body>

<div class="app">

  <header class="app-header">
    <div class="brand">
      <div class="logo">&#8721;</div>
      <div>
        <h1>AI Calculator</h1>
        <p>Voice &amp; text powered math assistant</p>
      </div>
    </div>
  </header>

  <main id="chat" class="chat">
    <div id="empty-state" class="empty-state">
      <div class="empty-icon">&#8721;</div>
      <h2>Ask me a math question</h2>
      <p>Type an expression or word problem below, or press the microphone to speak.</p>
    </div>
  </main>

  <footer class="composer">
    <button id="record-btn" class="icon-btn" title="Record voice" aria-label="Record voice">
      <span class="mic-dot"></span>
      <svg viewBox="0 0 24 24" width="22" height="22" fill="currentColor">
        <path d="M12 15a3 3 0 0 0 3-3V6a3 3 0 0 0-6 0v6a3 3 0 0 0 3 3Z"/>
        <path d="M19 11a1 1 0 1 0-2 0 5 5 0 0 1-10 0 1 1 0 1 0-2 0 7 7 0 0 0 6 6.93V20H9a1 1 0 1 0 0 2h6a1 1 0 1 0 0-2h-2v-2.07A7 7 0 0 0 19 11Z"/>
      </svg>
    </button>

    <input id="query-input" type="text" placeholder="Ask a math question..." autocomplete="off">

    <button id="ask-btn" class="send-btn" title="Send" aria-label="Send">
      <svg viewBox="0 0 24 24" width="20" height="20" fill="currentColor">
        <path d="M3.4 20.6 22 12 3.4 3.4 3 10l13 2-13 2z"/>
      </svg>
    </button>
  </footer>

  <div id="status-bar" class="status-bar hidden"></div>

</div>

<script src="/static/app.js"></script>
</body>
</html>
